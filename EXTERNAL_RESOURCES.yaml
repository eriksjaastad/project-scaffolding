# External Resources & Services
# Purpose: Track which external services, APIs, and resources are used across all projects
# Last Updated: 2026-04-14

metadata:
  purpose: "Track external services and costs across all projects"
  last_updated: "2026-04-20"
  why_exists: "When you get a bill or notification, you need to know which project uses that service"

# MARKET DATA POLICY
# Exchanges (NYSE, Nasdaq, CME) charge "professional subscribers" 10-30× the non-professional rate.
# Business entities, LLCs, and anyone deriving trading revenue are classified as professional.
# Always sign up for market data subscriptions (Tradier, Alpaca, Polygon, Databento, IBKR, etc.)
# under the PERSONAL account (spudlogic, spudlogic@gmail.com) to retain non-pro status.
# Re-evaluate carefully if/when SIL incorporates — incorrect re-certification can be expensive.
market_data_policy:
  rule: "All market data subscriptions under spudlogic (personal) account, never under synthinsightlabs"
  reason: "Exchange 'professional subscriber' fees are 10-30× higher for entities"
  applies_to: ["Tradier", "Alpaca", "Polygon", "Databento", "IBKR", "TradingView", "any exchange-feed vendor"]

# ACCOUNT REGISTRY
# Two accounts: personal (spudlogic) and business (synthinsightlabs)
# When ready to formalize SIL as a business: new bank account → Stripe under SIL → migrate customer-facing services
accounts:
  spudlogic:
    type: personal
    email: "spudlogic@gmail.com"
    github: "eriksjaastad"
    notes: "Personal account. Most services default here (legacy). GitHub, personal bank."
  synthinsightlabs:
    type: business
    email: "admin@synthinsightlabs.com"
    domain: "synthinsightlabs.com"
    github: null
    bank: null
    llc: false
    notes: "Future business entity. Has domain, email, Google Cloud Console. No bank account or LLC yet."

